# Pet grooming demo — local stack scaffold only.
# TODO: Add api service build context when Dockerfile exists.

services:
  api:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./packages/api:/app
    command: ["sh", "-c", "pip install fastapi uvicorn && uvicorn main:app --host 0.0.0.0 --port 8000"]
    ports:
      - "8001:8000"
  # web: — add Nuxt dev server when node image is configured
