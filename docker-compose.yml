# MurphyX local stack — Redis, API, and Worker.
# Safe for public repo: no secrets; use .env for overrides (see .env.example).

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis

  worker:
    build: .
    command: ["python", "-m", "murphyx.runtime.worker_loop"]
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    volumes:
      - ./artifacts:/app/artifacts
